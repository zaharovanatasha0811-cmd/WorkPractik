<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аренда авто — Сервис бронирования</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="site-body">
    <!-- Контейнер модального окна (hidden управляет видимостью) -->
    <div class="auth-container hidden">
        <section id="page-register" class="auth-section">
            <h2 class="auth-title">Бронирование авто</h2>
            
            <input type="text" id="reg-name" placeholder="ФИО" class="form-input">
            <input type="email" id="reg-email" placeholder="Электронная почта" class="form-input">
            <input type="tel" id="reg-phone" placeholder="Номер телефона" class="form-input">
            <input type="text" id="reg-licence" placeholder="Водительское удостоверение" class="form-input">
                
            <div class="policy-wrapper">
                <input type="checkbox" id="reg-policy" class="policy-checkbox">
                <label for="reg-policy" class="policy-label">
                    Я соглашаюсь на <a href="#" class="policy-link">обработку персональных данных</a>
                </label>
            </div>

            <button id="btn-register" class="btn-primary">Забронировать</button>
            <a href="#" id="link-to-login" class="auth-link">Назад к каталогу</a>
        </section>
    </div>
</body>
</html>
